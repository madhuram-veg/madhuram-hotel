<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Madhuram Restaurant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="font-sans bg-gray-100 min-h-screen">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-zinc-900 px-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-2xl font-bold text-emerald-800 mb-6 text-center">Madhuram Admin</h2>
      <form id="loginForm" class="space-y-5">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold">Username</label>
          <input type="text" id="loginUser" class="border p-2.5 rounded-lg" placeholder="admin" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold">Password</label>
          <input type="password" id="loginPass" class="border p-2.5 rounded-lg" placeholder="••••••••" />
        </div>
        <p id="loginErr" class="text-red-500 text-sm hidden">Invalid Credentials.</p>
        <button type="submit" class="w-full bg-emerald-800 text-white py-3 rounded-lg font-bold transition hover:bg-emerald-900">Login</button>
      </form>
    </div>
  </div>

  <!-- MAIN DASHBOARD PANEL -->
  <div id="dashboard" class="hidden min-h-screen flex">
    <aside class="w-60 bg-zinc-900 text-gray-300 flex flex-col">
      <div class="p-6 border-b border-zinc-800 font-bold text-white tracking-wide">MADHURAM PANEL</div>
      <nav class="flex-1 p-4 space-y-1">
        <button class="w-full text-left p-3 rounded-lg active sidebar-link" data-panel="overview">Dashboard Overview</button>
        <button class="w-full text-left p-3 rounded-lg sidebar-link" data-panel="menu-mgmt">Menu Management</button>
        <button class="w-full text-left p-3 rounded-lg sidebar-link" data-panel="inquiries">Form Inquiries</button>
        <button class="w-full text-left p-3 rounded-lg sidebar-link" data-panel="settings">Business Settings</button>
      </nav>
      <div class="p-4"><button onclick="logout()" class="w-full border border-red-500/30 text-red-400 p-2 rounded-lg hover:bg-red-500/10">Sign Out</button></div>
    </aside>

    <main class="flex-1 bg-gray-50 flex flex-col">
      <header class="bg-white border-b px-8 py-4 flex justify-between items-center shadow-sm">
        <h1 id="pageTitle" class="text-xl font-bold text-gray-800">Overview</h1>
      </header>

      <div class="p-8">
        <!-- OVERVIEW -->
        <div id="panel-overview" class="panel active space-y-6">
          <div class="grid grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl border shadow-sm"><div class="text-3xl font-bold text-emerald-800" id="statMenuItems">0</div><div class="text-sm text-gray-500">Menu Items</div></div>
            <div class="bg-white p-6 rounded-xl border shadow-sm"><div class="text-3xl font-bold text-amber-600" id="statReservations">0</div><div class="text-sm text-gray-500">New Inquiries</div></div>
          </div>
        </div>

        <!-- MENU MODULE -->
        <div id="panel-menu-mgmt" class="panel hidden space-y-4">
          <div class="flex justify-between items-center">
            <h2 class="text-lg font-bold text-gray-800">Dishes List</h2>
            <button onclick="openMenuModal()" class="bg-emerald-800 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-emerald-900">+ Add Item</button>
          </div>
          <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
              <thead><tr class="bg-gray-50 border-b text-xs text-gray-500 uppercase"><th class="p-4">Item Name</th><th class="p-4">Category</th><th class="p-4">Price</th><th class="p-4">Actions</th></tr></thead>
              <tbody id="menuTableBody"></tbody>
            </table>
          </div>
        </div>

        <!-- INQUIRIES -->
        <div id="panel-inquiries" class="panel hidden">
          <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
              <thead><tr class="bg-gray-50 border-b text-xs text-gray-500 uppercase"><th class="p-4">Guest</th><th class="p-4">Phone</th><th class="p-4">Type</th><th class="p-4">Date</th></tr></thead>
              <tbody id="inquiryTableBody"></tbody>
            </table>
          </div>
        </div>

        <!-- SETTINGS -->
        <div id="panel-settings" class="panel hidden max-w-xl bg-white border p-6 rounded-xl shadow-sm">
          <form id="settingsForm" class="space-y-4">
            <div class="flex flex-col gap-1"><label class="text-xs font-semibold">Address</label><input type="text" id="setAddress" class="border p-2 rounded-lg text-sm" /></div>
            <div class="flex flex-col gap-1"><label class="text-xs font-semibold">Phone</label><input type="text" id="setPhone" class="border p-2 rounded-lg text-sm" /></div>
            <button type="submit" class="bg-emerald-800 text-white px-4 py-2 rounded-lg text-sm font-semibold">Save Changes</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- ADD MENU MODAL (With both Link & Upload option) -->
  <div id="menuModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-2xl">
      <h3 class="text-lg font-bold mb-4 text-emerald-800">Add Menu Item</h3>
      <form id="menuItemForm" class="space-y-4">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold">Dish Name *</label>
          <input type="text" id="itemName" placeholder="e.g. Paneer Butter Masala" class="w-full border p-2 rounded-lg text-sm" required />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold">Category *</label>
          <select id="itemCategory" class="w-full border p-2 rounded-lg text-sm" required>
            <option value="starters">Starters</option>
            <option value="main">Main Course</option>
            <option value="thalis">Thalis</option>
          </select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold">Price *</label>
          <input type="text" id="itemPrice" placeholder="e.g. 180" class="w-full border p-2 rounded-lg text-sm" required />
        </div>
        
        <!-- IMAGE SELECTION: URL OR UPLOAD -->
        <div class="border-t pt-3 space-y-3">
          <span class="text-xs font-bold text-gray-500 block">Dish Image (Choose One Option)</span>
          
          <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-gray-600">Option A: Direct Photo Upload</label>
            <input type="file" id="itemImageFile" accept="image/*" class="w-full border p-1 rounded-lg text-xs bg-gray-50" />
          </div>
          
          <div class="text-center text-xs text-gray-400 font-bold">— OR —</div>
          
          <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-gray-600">Option B: Web Image URL Link</label>
            <input type="url" id="itemImageUrl" placeholder="https://example.com/food.jpg" class="w-full border p-2 rounded-lg text-sm" />
          </div>
        </div>

        <div class="flex gap-2 pt-2">
          <button type="submit" class="flex-1 bg-emerald-800 text-white py-2 rounded-lg font-semibold hover:bg-emerald-900">Save Item</button>
          <button type="button" onclick="closeMenuModal()" class="flex-1 bg-gray-100 py-2 rounded-lg text-gray-600 font-semibold hover:bg-gray-200">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
