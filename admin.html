<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Panel — Madhuram Restaurant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#1E3F20',
              dark: '#142b15',
              mid: '#2a5430',
              light: '#3a7040',
              accent: '#D4AF37'
            }
          },
          fontFamily: {
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
            serif: ['"Playfair Display"', 'Georgia', 'serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="font-sans bg-slate-50 text-slate-800 antialiased min-h-screen">

  <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-brand-dark px-4 relative overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(212,175,55,0.12),transparent_45%)]"></div>
    <div class="w-full max-w-md relative z-10">
      <div class="text-center mb-8">
        <h2 class="font-serif font-bold text-3xl text-white tracking-wide">Madhuram</h2>
        <p class="text-brand-accent text-xs font-semibold tracking-widest uppercase mt-1">Management Portal</p>
      </div>
      <div class="bg-white rounded-2xl shadow-xl p-8 border border-white/10">
        <h3 class="text-xl font-bold text-slate-900 mb-6">Account Sign In</h3>
        <form id="loginForm" class="space-y-5">
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-slate-600">Administrative Username</label>
            <input type="text" id="loginUser" autocomplete="username" class="w-full border border-slate-200 bg-slate-50 p-3 rounded-xl text-sm outline-none focus:border-brand focus:bg-white focus:ring-2 focus:ring-brand/10 transition-all" placeholder="admin" required />
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-slate-600">Security Password</label>
            <input type="password" id="loginPass" autocomplete="current-password" class="w-full border border-slate-200 bg-slate-50 p-3 rounded-xl text-sm outline-none focus:border-brand focus:bg-white focus:ring-2 focus:ring-brand/10 transition-all" placeholder="••••••••" required />
          </div>
          <p id="loginErr" class="text-red-600 text-xs font-medium hidden flex items-center gap-1">❌ Authentication parameters failed.</p>
          <button type="submit" class="w-full bg-brand text-white py-3.5 rounded-xl font-semibold text-sm tracking-wide transition-all hover:bg-brand-mid active:scale-[0.99] shadow-lg shadow-brand/10">Access Workspace</button>
        </form>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden min-h-screen flex flex-col md:flex-row">
    
    <aside class="w-full md:w-64 bg-brand-dark text-slate-300 flex flex-col border-r border-brand/20 shrink-0">
      <div class="p-6 border-b border-white/5 flex items-center gap-3">
        <div class="w-3 h-3 bg-brand-accent rounded-full shrink-0 shadow-sm shadow-brand-accent/50"></div>
        <span class="font-serif font-bold text-lg text-white tracking-wider">Madhuram Hub</span>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium active sidebar-link transition-all" data-panel="overview">
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/></svg>
          Overview
        </button>
        <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium sidebar-link transition-all" data-panel="menu-mgmt">
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.232.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
          Menu Inventory
        </button>
        <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium sidebar-link transition-all" data-panel="inquiries">
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2m-4-1v8m0 0l3-3m-3 3L9 8m-5 5h2.586a1 1 0 01.707.293l2.414 2.414a1 1 0 00.707.293h3.172a1 1 0 00.707-.293l2.414-2.414a1 1 0 01.707-.293H20"/></svg>
          Guest Inquiries
        </button>
        <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium sidebar-link transition-all" data-panel="settings">
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.
