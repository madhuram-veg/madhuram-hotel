<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madhuram Admin Panel - Secure Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root { --primary: #1e3a1e; --accent: #e2ba43; --dark: #0f172a; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; color: var(--dark); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center; }
        
        /* Password Lock Screen */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { color: var(--primary); margin-bottom: 10px; font-size: 26px; }
        .login-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 6px; cursor: pointer; margin-top: 15px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; }
        .error-msg { color: var(--danger); font-size: 14px; margin-top: 12px; display: none; }

        /* Dashboard Area */
        .dashboard-container { display: none; width: 100%; max-width: 1000px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); align-self: flex-start; margin-top: 40px; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 30px; }
        .logout-btn { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 768px) { .panel-grid { grid-template-columns: 1fr; } }
        
        .form-section { background: #fffaf0; padding: 30px; border-radius: 8px; border: 1px solid #fef3c7; }
        .form-section h3 { margin-bottom: 20px; color: var(--primary); font-size: 20px; border-bottom: 2px solid #fde68a; padding-bottom: 8px; }
        
        .menu-preview-section h3 { margin-bottom: 20px; color: var(--primary); font-size: 20px; }
        .admin-dish-card { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .admin-dish-info { display: flex; align-items: center; gap: 15px; }
        .admin-dish-img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
        .delete-item-btn { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- LOCK SCREEN -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2>Madhuram Admin</h2>
            <p>Enter password to modify menus & photos</p>
            <form id="loginForm">
                <div class="input-group">
                    <label>Password:</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn"><i class="fa-solid fa-lock-open"></i> Unlock Panel</button>
                <div id="errorMsg" class="error-msg">Galat Password!</div>
            </form>
        </div>
    </div>

    <!-- MAIN CONTROL DASHBOARD -->
    <div id="dashboardContainer" class="dashboard-container">
        <div class="dash-header">
            <h2>Madhuram Menu Manager</h2>
            <button onclick="logoutAdmin()" class="logout-btn"><i class="fa-solid fa-power-off"></i> Logout</button>
        </div>
        
        <div class="panel-grid">
            <!-- 1. UPLOAD PHOTO & ADD MENU FORM -->
            <div class="form-section">
                <h3>Add New Dish / Change Menu</h3>
                <form id="addMenuForm">
                    <div class="input-group">
                        <label>Dish Name (Item Ka Naam):</label>
                        <input type="text" id="dishName" placeholder="e.g., Kadhai Paneer Special" required>
                    </div>
                    <div class="input-group">
                        <label>Photo Link (Image URL):</label>
                        <input type="url" id="dishImg" placeholder="Paste Unsplash or internet image link" required>
                        <small style="color:#64748b; font-size:12px; display:block; margin-top:4px;">Tip: Kisi bhi photo par right-click karke "Copy Image Address" karke yahan paste karein.</small>
                    </div>
                    <div class="input-group">
                        <label>Description (Dish Ki Details):</label>
                        <textarea id="dishDesc" rows="3" placeholder="Description baare me likhein..." required></textarea>
                    </div>
                    <button type="submit" class="login-btn" style="background: var(--primary);"><i class="fa-solid fa-plus"></i> Add Item to Live Menu</button>
                </form>
            </div>

            <!-- 2. LIVE ITEMS LIST & DELETE CONTROLLER -->
            <div class="menu-preview-section">
                <h3>Current Live Items (Edit/Delete)</h3>
                <div id="adminItemsList">
                    <!-- Javascript dynamically adds items here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Secure Password Check
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const passwordInput = document.getElementById('adminPassword').value;
            if (passwordInput === "Madhuram@2026") {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'block';
                loadAdminItems();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });

        function logoutAdmin() {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        // --- MANAGE MENU ITEMS ENGINE ---
        const defaultDishes = [
            { id: 1, name: "Premium Royal Thalis", desc: "A complete traditional meal featuring an assortment of seasonal vegetables, rich paneer curry, aromatic basmati rice, choice of breads, and classic Indian dessert.", img: "https://images.unsplash.com/photo-1589301760014-d929f3979dbc?auto=format&fit=crop&w=600&q=80" },
            { id: 2, name: "Rich Main Course Delicacies", desc: "From buttery Paneer Specialities to authentic slow-cooked Dal Makhani, prepared meticulously using standard premium spices and pure dairy products.", img: "https://images.unsplash.com/photo-1631452180519-c014fe946bc7?auto=format&fit=crop&w=600&q=80" }
        ];

        // Initialize Menu from database storage
        if(!localStorage.getItem('madhuramMenu')) {
            localStorage.setItem('madhuramMenu', JSON.stringify(defaultDishes));
        }

        function loadAdminItems() {
            const items = JSON.parse(localStorage.getItem('madhuramMenu'));
            const listContainer = document.getElementById('adminItemsList');
            listContainer.innerHTML = '';

            items.forEach(item => {
                listContainer.innerHTML += `
                    <div class="admin-dish-card">
                        <div class="admin-dish-info">
                            <img src="${item.img}" class="admin-dish-img">
                            <div>
                                <strong style="display:block;">${item.name}</strong>
                                <span style="font-size:12px; color:#64748b;">ID: #${item.id}</span>
                            </div>
                        </div>
                        <button onclick="deleteMenuItem(${item.id})" class="delete-item-btn"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });
        }

        // Add Item Core Action
        document.getElementById('addMenuForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const items = JSON.parse(localStorage.getItem('madhuramMenu'));
            
            const newItem = {
                id: Date.now(),
                name: document.getElementById('dishName').value,
                img: document.getElementById('dishImg').value,
                desc: document.getElementById('dishDesc').value
            };

            items.push(newItem);
            localStorage.setItem('madhuramMenu', JSON.stringify(items));
            
            // Reset form fields
            document.getElementById('addMenuForm').reset();
            loadAdminItems();
            alert('Mubarak Ho! Naya item live menu me add ho gaya hai.');
        });

        // Delete Item Core Action
        function deleteMenuItem(id) {
            if(confirm('Kya aap sach me ye item menu se hatana chahte hain?')) {
                let items = JSON.parse(localStorage.getItem('madhuramMenu'));
                items = items.filter(item => item.id !== id);
                localStorage.setItem('madhuramMenu', JSON.stringify(items));
                loadAdminItems();
            }
        }
    </script>
</body>
</html>
